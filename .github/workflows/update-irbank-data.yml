name: IRBankデータ更新

on:
  workflow_dispatch:       # 手動実行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── uploadフォルダから年別ディレクトリへ整理 ────────────────────────
      - name: uploadフォルダから年別に整理
        run: |
          python3 << 'EOF'
          import os, shutil

          def detect_year_and_type(filepath):
              with open(filepath, encoding='utf-8-sig', errors='replace') as f:
                  lines = f.readlines()
              hi = -1
              for i, line in enumerate(lines[:8]):
                  if line.startswith('コード'):
                      hi = i
                      break
              if hi < 0:
                  return None, None
              headers = lines[hi].rstrip('\n').split(',')
              try:
                  yi = headers.index('年度')
              except ValueError:
                  return None, None
              year = None
              for line in lines[hi+1:]:
                  cols = line.split(',')
                  if not cols[0].strip():
                      continue
                  fy = cols[yi].strip() if yi < len(cols) else ''
                  y = fy.split('/')[0] if '/' in fy else fy[:4]
                  if y.isdigit() and len(y) == 4:
                      year = y
                      break
              if not year:
                  return None, None
              is_pl = any(h in headers for h in ['売上高', '営業利益', '経常利益'])
              is_bs = any(h in headers for h in ['総資産', '純資産', '自己資本'])
              ftype = 'pl' if is_pl else ('bs' if is_bs else None)
              return year, ftype

          upload_dir = 'data/upload'
          if os.path.isdir(upload_dir):
              for fname in sorted(os.listdir(upload_dir)):
                  if not fname.endswith('.csv'):
                      continue
                  fpath = os.path.join(upload_dir, fname)
                  year, ftype = detect_year_and_type(fpath)
                  if not year or not ftype:
                      print(f"  SKIP {fname}: year/type不明")
                      continue
                  dest = f'data/{year}/{ftype}.csv'
                  if os.path.exists(dest):
                      print(f"  SKIP {dest} (既存)")
                      continue
                  os.makedirs(f'data/{year}', exist_ok=True)
                  shutil.copy2(fpath, dest)
                  print(f"  {fname} -> {dest}")
          else:
              print("data/upload フォルダが存在しません")
          EOF

      # ── 統合CSV作成 (all-pl.csv / all-bs.csv) ───────────────────────────
      - name: 統合CSV作成
        run: |
          python3 << 'EOF'
          import os

          def create_combined(data_dir, output_file, filename):
              year_dirs = sorted([d for d in os.listdir(data_dir)
                                  if os.path.isdir(os.path.join(data_dir, d))
                                  and d.isdigit() and len(d) == 4])
              header_written = False
              total = 0
              with open(output_file, 'w', encoding='utf-8') as out:
                  for year in year_dirs:
                      src = os.path.join(data_dir, year, filename)
                      if not os.path.exists(src):
                          continue
                      with open(src, encoding='utf-8-sig', errors='replace') as f:
                          lines = f.readlines()
                      hi = -1
                      preamble = []
                      for i, line in enumerate(lines[:8]):
                          if line.startswith('コード'):
                              hi = i
                              break
                          preamble.append(line)
                      if hi < 0:
                          continue
                      if not header_written:
                          out.writelines(preamble)
                          out.write(lines[hi])
                          header_written = True
                      count = 0
                      for line in lines[hi+1:]:
                          if line.strip():
                              out.write(line)
                              count += 1
                      total += count
                      print(f"  {year}: {count}行")
              print(f"  -> {output_file} 合計{total}行")

          create_combined('data', 'data/all-pl.csv', 'pl.csv')
          create_combined('data', 'data/all-bs.csv', 'bs.csv')
          EOF

      # ── コミット・プッシュ ───────────────────────────────────────────────
      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "データ更新: $(date +'%Y年%m月')"
          git push
