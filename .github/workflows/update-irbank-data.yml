name: IRBankデータ更新

on:
  schedule:
    - cron: '0 1 1 * *'  # 毎月1日 AM1:00 UTC
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # ── index.html用: 月次スナップショット ──────────────────────────────
      - name: 月次CSVダウンロード (index.html用)
        run: |
          DATE=$(date +'%Y-%m')
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          mkdir -p data/$DATE

          HTTP=$(curl -s -o data/$DATE/fy-balance-sheet.csv -w "%{http_code}" \
            -L -A "${UA}" -H "Referer: https://irbank.net/" \
            https://f.irbank.net/files/0000/fy-balance-sheet.csv)
          echo "BS HTTP: ${HTTP}"
          [ "${HTTP}" = "200" ] || echo "WARNING: BS download returned ${HTTP}"

          HTTP=$(curl -s -o data/$DATE/fy-profit-and-loss.csv -w "%{http_code}" \
            -L -A "${UA}" -H "Referer: https://irbank.net/" \
            https://f.irbank.net/files/0000/fy-profit-and-loss.csv)
          echo "PL HTTP: ${HTTP}"
          [ "${HTTP}" = "200" ] || echo "WARNING: PL download returned ${HTTP}"

      # ── compare.html用: 年別CSVダウンロード (2013-2025) ─────────────────
      - name: 年別CSVダウンロード (compare.html用)
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          BASE="https://f.irbank.net/files"

          for YEAR in $(seq 2013 2025); do
            OUTDIR="data/${YEAR}"
            if [ -f "${OUTDIR}/pl.csv" ] && [ -f "${OUTDIR}/bs.csv" ]; then
              echo "SKIP: ${YEAR} already exists"
              continue
            fi

            YY=$(printf "%02d" $((YEAR % 100)))
            CODE="00${YY}"
            echo "=== Downloading ${YEAR} (code=${CODE}) ==="
            mkdir -p "${OUTDIR}"

            HTTP_PL=$(curl -s -o "${OUTDIR}/pl.csv" -w "%{http_code}" \
              -L -A "${UA}" -H "Referer: https://irbank.net/" \
              "${BASE}/${CODE}/fy-profit-and-loss.csv")
            echo "PL HTTP: ${HTTP_PL}"

            HTTP_BS=$(curl -s -o "${OUTDIR}/bs.csv" -w "%{http_code}" \
              -L -A "${UA}" -H "Referer: https://irbank.net/" \
              "${BASE}/${CODE}/fy-balance-sheet.csv")
            echo "BS HTTP: ${HTTP_BS}"

            if [ "${HTTP_PL}" != "200" ]; then
              echo "PL failed (${HTTP_PL}) - removing"
              rm -f "${OUTDIR}/pl.csv"
            else
              echo "PL OK: $(wc -l < ${OUTDIR}/pl.csv) lines"
            fi
            if [ "${HTTP_BS}" != "200" ]; then
              echo "BS failed (${HTTP_BS}) - removing"
              rm -f "${OUTDIR}/bs.csv"
            else
              echo "BS OK: $(wc -l < ${OUTDIR}/bs.csv) lines"
            fi
          done

      # ── manifest.json 更新 ───────────────────────────────────────────────
      - name: manifest.json 更新
        run: |
          DATE=$(date +'%Y-%m')
          YEARS_WITH_DATA=$(find data/ -mindepth 2 -name "pl.csv" \
            | sed 's|data/||;s|/pl.csv||' | grep -v '^[0-9]\{4\}-' | sort -n)
          LATEST_YEAR=$(echo "$YEARS_WITH_DATA" | tail -1)
          ALL_JSON=$(echo "$YEARS_WITH_DATA" | grep . | jq -R . | jq -s .)
          echo "{\"latest\":\"${DATE}\",\"latest_year\":\"${LATEST_YEAR}\",\"years\":${ALL_JSON}}" \
            > data/manifest.json
          cat data/manifest.json

      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "データ更新: $(date +'%Y年%m月')"
          git push
