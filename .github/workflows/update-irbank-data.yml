name: IRBankデータ更新

on:
  schedule:
    - cron: '0 1 1 * *'  # 毎月1日 AM1:00 UTC
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: CSVダウンロード
        run: |
          mkdir -p data
          curl -f -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -o data/fy-balance-sheet.csv \
            https://f.irbank.net/files/0000/fy-balance-sheet.csv
          curl -f -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -o data/fy-profit-and-loss.csv \
            https://f.irbank.net/files/0000/fy-profit-and-loss.csv

      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "データ更新: $(date +'%Y年%m月')"
          git push
